name: Build LebaoLabelPrinter EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            python-version: '3.12'
            artifact-name: LebaoLabelPrinter-x64
          - arch: arm64
            runner: windows-11-arm
            python-version: '3.13'
            artifact-name: LebaoLabelPrinter-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pyinstaller

      - name: Ensure output directory exists
        run: if not exist output mkdir output
        shell: cmd

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller --onedir --windowed --name="LebaoLabelPrinter" --add-data="config.ini;." --add-data="README.txt;." --add-data="output;output" --hidden-import=pandas --hidden-import=openpyxl --hidden-import=pandas._libs.tslibs --clean label_printer.py

      - name: List build output
        run: dir dist\LebaoLabelPrinter
        shell: cmd

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/LebaoLabelPrinter/
          retention-days: 30
