# ============================================================
# 乐宝质检 - 原料留样标签打印工具 配置文件
# ============================================================

[BarTender]
# BarTender 安装路径
bartender_path = C:\Program Files\Seagull\BarTender 9.4\bartend.exe

# 标签模板文件路径 (.btw) — 请根据实际路径修改
# 模板一次打印两张标签(2-up布局)
template_path = 

# 打印机名称
printer_name = TSC TTP-342E Pro

# 每条记录打印份数（BTW模板本身一次出2张，所以设1即可）
copies = 1

[Excel]
# 打印前必须检查的列名（逗号分隔），这些列不能有空值
# 如有空值，会提示具体是第几行哪个列为空
required_columns = 编码,名称,规格型号,基本单位
